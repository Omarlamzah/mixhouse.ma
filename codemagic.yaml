workflows:
  ios-validation:
    name: iOS validation (no signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install Flutter packages
        script: flutter pub get
      - name: Install CocoaPods packages
        script: |
          cd ios
          pod install
      - name: Analyze project
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build iOS without code signing
        script: flutter build ios --release --no-codesign --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log

  ios-release:
    name: iOS App Store / TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      integrations:
        app_store_connect: Codemagic
      ios_signing:
        provisioning_profiles:
          - mixhouse_appstore_profile
        certificates:
          - mixhouse_distribution
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install Flutter packages
        script: flutter pub get
      - name: Install CocoaPods packages
        script: |
          cd ios
          pod install
      - name: Apply iOS signing profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
          IPA_PATH="$(find "$CM_BUILD_DIR/build/ios" -type f -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA was generated under build/ios"
            find "$CM_BUILD_DIR/build/ios" -maxdepth 4 -type f -print
            exit 1
          fi
          mkdir -p "$CM_BUILD_DIR/codemagic-artifacts"
          cp "$IPA_PATH" "$CM_BUILD_DIR/codemagic-artifacts/Mixhouse.ipa"
    artifacts:
      - codemagic-artifacts/*.ipa
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
