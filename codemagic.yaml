workflows:
  ios-validation:
    name: iOS validation (no signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install Flutter packages
        script: flutter pub get
      - name: Install CocoaPods packages
        script: |
          cd ios
          pod install
      - name: Analyze project
        script: flutter analyze
      - name: Run tests
        script: flutter test
      - name: Build iOS without code signing
        script: flutter build ios --release --no-codesign --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/ios/iphoneos/Runner.app
      - flutter_drive.log

  ios-release:
    name: iOS App Store / TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ma.mixhouse.app
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Install Flutter packages
        script: flutter pub get
      - name: Install CocoaPods packages
        script: |
          cd ios
          pod install
      - name: Apply iOS signing profiles
        script: xcode-project use-profiles
      - name: Build signed IPA
        script: flutter build ipa --release --build-number=$PROJECT_BUILD_NUMBER
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
